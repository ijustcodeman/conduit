services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: conduit-docker-development-secret
      JWT_EXPIRES_IN: 1d
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5000:80"
